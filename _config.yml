# SITE CONFIGURATION
title: Vitali Set
author: Carlo
description: Personal blog with technical discussions, experiments, and reproducible deep-dives in data science and machine learning, by Carlo Lemos.
baseurl: "" # empty for a root user/org site (vitaliset.github.io); use e.g. "/blog" only for a project subpath
url: "https://vitaliset.github.io/" # the base hostname & protocol for your site, e.g. http://example.com

# SEO PLUGIN
social:
  name: Vitali Set
  links:
    - https://www.linkedin.com/in/carlo-lemos
    - https://github.com/vitaliset/

# THEME SETTINGS
navigation: # Navigation links
  - {name: 'Home', link: '/'}
  - {name: 'Links', link: '/links'}
  - {name: 'Interview tips', link: '/interview'}
  - {name: 'Mentoring guideline', link: '/tutoring-guideline'}
  - {name: 'About', link: '/about'}

hero_img: teste1.jpg # Main background image: path relative to /assets/img/ => outputs /assets/img/teste1.jpg

linkedin_username: carlo-lemos # LinkedIn handle for the footer link
github_username: vitaliset # GitHub handle for the footer link

service_worker: false # retired: the sw-precache worker (Gulp-generated) froze and served stale assets; see sw.js

# BUILD SETTINGS
markdown: kramdown
highlighter: rouge # rouge or pygments or null
exclude:
  - README.md
  - DEVELOPMENT.md
  - Gemfile
  - Gemfile.lock
  - vendor
  - code        # consolidated notebook/code tree (.ipynb, pyproject.toml, poetry.lock, lightgbm/, caches)
  - scripts     # notebook -> post conversion pipeline

include: ['_pages']
permalink: /:title/

compress_html:
  clippings: all

plugins:
  - jekyll-sitemap
  - jekyll-seo-tag
