name: tests

# Runs the notebook -> post pipeline tests so they actually fire on every change
# (GitHub Pages already builds the site on push, so this only adds the test gate):
#   - snapshot:  generated code/output/figures match the committed posts
#   - prose-sync: each post's prose (per language) matches its notebook
#   - parity:     bilingual posts' EN and PT notebooks stay parallel
#   - lang:      availability-note logic stays consistent with translated content
# See scripts/README.md and DEVELOPMENT.md.

on:
  push:
  pull_request:

jobs:
  pipeline-tests:
    name: pipeline tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt
      - run: pip install -r scripts/requirements.txt
      - run: python -m pytest scripts/tests/ -q
